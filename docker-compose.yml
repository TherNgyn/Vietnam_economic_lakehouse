version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: postgres_airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  minio:
    image: minio/minio:latest
    container_name: minio_lakehouse
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: always

  airflow-webserver:
    build:
      context: .
      dockerfile: ./infra_configs/airflow/Dockerfile
    container_name: airflow_webserver
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      AIRFLOW_HOME: /airflow
      AIRFLOW__CORE__DAGS_FOLDER: /airflow/dags
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: 'False'
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/airflow/dags
      - ./ingestion:/airflow/ingestion
      - ./historical_dataset:/airflow/historical_dataset
      - airflow_logs:/airflow/logs
    user: "0:0"
    command: >
      bash -c "mkdir -p /airflow/logs && 
               chmod -R 777 /airflow/logs &&
               airflow db init && 
               airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
               airflow webserver"
    restart: always

  airflow-scheduler:
    build:
      context: .
      dockerfile: ./infra_configs/airflow/Dockerfile
    container_name: airflow_scheduler
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      AIRFLOW_HOME: /airflow
      AIRFLOW__CORE__DAGS_FOLDER: /airflow/dags
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    volumes:
      - ./dags:/airflow/dags
      - ./ingestion:/airflow/ingestion
      - ./historical_dataset:/airflow/historical_dataset
      - airflow_logs:/airflow/logs
    user: "0:0"
    command: bash -c "chmod -R 777 /airflow/logs && airflow db init && airflow scheduler"
    restart: always

volumes:
  minio_data:
  postgres_data:
  airflow_logs: