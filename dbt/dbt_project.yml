name: Vietnam_economic_lakehouse
version: '1.0.0'
config-version: 2

profile: Vietnam_economic_lakehouse

model-paths: ["models"]
macro-paths: ["macros"]

models:
  economic_warehouse:
    staging:
      +materialized: view
      +schema: staging

    dimensions:
      +materialized: table
      +schema: gold
      +file_format: delta

    facts:
      +materialized: incremental
      +schema: gold
      +file_format: delta
      +incremental_strategy: merge
      +on_schema_change: sync_all_columns

    marts:
      +materialized: table
      +schema: marts
      +file_format: delta